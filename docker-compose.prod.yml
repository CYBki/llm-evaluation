# ============================================================================
# Docker Compose - Production Overlay
# ============================================================================
# Kullanım: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================================

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

services:
  migrate:
    env_file:
      - .env.prod
    restart: on-failure
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Nginx - Reverse Proxy (Gateway)
  # Tek URL'den tüm servisleri yönetir
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS (SSL sertifikası eklenince)
    restart: unless-stopped
    networks:
      - external     # İnternet'e açık
      - internal     # API'ye bağlanmak için
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    env_file:
      - .env.prod
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers ${WEB_CONCURRENCY:-4}
      --bind 0.0.0.0:8000
      --timeout ${WEB_TIMEOUT:-120}
      --access-logfile -
      --error-logfile -
      --log-level info
    # Port mapping kaldırıldı - sadece Nginx üzerinden erişilebilir
    # ports:
    #   - "8000:8000"  # Artık direkt erişilemez (güvenlik)
    restart: unless-stopped
    networks:
      - internal     # Sadece internal network (DB, Redis, Nginx ile konuşur)
    expose:
      - "8000"       # Container'lar arası (Nginx için)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    env_file:
      - .env.prod
    command: >
      celery -A app.tasks.celery_app.celery_app worker
      --loglevel=${CELERY_WORKER_LOGLEVEL:-warning}
      --concurrency=${CELERY_WORKER_CONCURRENCY:-8}
      --pool=${CELERY_WORKER_POOL:-prefork}
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru

  db:
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      POSTGRES_DB: rageval_prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=100
      -c effective_cache_size=768MB

volumes:
  pgdata_prod:
    driver: local
