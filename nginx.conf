# ============================================================================
# NGINX - Reverse Proxy Configuration
# ============================================================================
# Tüm servisleri tek domain'den yönetir
# Kullanım: docker-compose.prod.yml içinde nginx servisi olarak mount edilir
# ============================================================================

events {
    worker_connections 1024;
}

http {
    # ────────────────────────────────────────────────────────────────────────
    # Upstream Definitions (Backend Services)
    # ────────────────────────────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
    }

    # ────────────────────────────────────────────────────────────────────────
    # Rate Limiting (DDoS Protection)
    # ────────────────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ────────────────────────────────────────────────────────────────────────
    # Logging
    # ────────────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ────────────────────────────────────────────────────────────────────────
    # Server Block
    # ────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name myapp.com www.myapp.com localhost;

        # HTTP → HTTPS redirect (production'da uncomment et)
        # return 301 https://$server_name$request_uri;

        # ────────────────────────────────────────────────────────────────────
        # API Routes - /api/* → API Service (port 8000)
        # ────────────────────────────────────────────────────────────────────
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Reverse proxy to API service
            proxy_pass http://api_backend/;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Buffering
            proxy_buffering off;

            # WebSocket support (eğer gerekirse)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ────────────────────────────────────────────────────────────────────
        # Health Check - /health → API Service
        # ────────────────────────────────────────────────────────────────────
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
            access_log off;  # Health check loglarını spam'leme
        }

        # ────────────────────────────────────────────────────────────────────
        # Docs - /docs, /redoc → API Documentation
        # ────────────────────────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # ────────────────────────────────────────────────────────────────────
        # Metrics - /metrics → Prometheus metrics
        # ────────────────────────────────────────────────────────────────────
        location /metrics {
            # Internal only (sadece monitoring tools erişsin)
            allow 10.0.0.0/8;    # Internal network
            allow 172.16.0.0/12; # Docker network
            deny all;

            proxy_pass http://api_backend/metrics;
            proxy_set_header Host $host;
        }

        # ────────────────────────────────────────────────────────────────────
        # Security Headers
        # ────────────────────────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # HSTS (production'da uncomment et)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ────────────────────────────────────────────────────────────────────
        # Root - Ana sayfa
        # ────────────────────────────────────────────────────────────────────
        location = / {
            return 200 '{"service": "RAG Evaluation API", "status": "ok", "docs": "/docs"}';
            add_header Content-Type application/json;
        }

        # ────────────────────────────────────────────────────────────────────
        # 404 Handler
        # ────────────────────────────────────────────────────────────────────
        location / {
            return 404 '{"error": "Not found", "message": "Invalid endpoint"}';
            add_header Content-Type application/json;
        }
    }

    # ════════════════════════════════════════════════════════════════════════
    # HTTPS Server (Production)
    # ════════════════════════════════════════════════════════════════════════
    # SSL sertifikası eklendiğinde uncomment et
    # ════════════════════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name myapp.com www.myapp.com;
    #
    #     # SSL Certificates (Let's Encrypt)
    #     ssl_certificate /etc/letsencrypt/live/myapp.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/myapp.com/privkey.pem;
    #
    #     # SSL Configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # Yukarıdaki location bloklarını buraya kopyala
    #     location / {
    #         proxy_pass http://api_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
